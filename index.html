<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Інтерактивна сторінка реєстрації</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Конференція 2025</h1>
</header>

<main class="container">

    <nav class="sidebar">
        <h2>Меню</h2>

        <ul>
            <li><a href="#">Головна</a></li>
            <li><a href="#">Програма</a></li>
            <li><a href="#">Учасники</a></li>
            <li><a href="#">Контакти</a></li>
        </ul>
    </nav>

    <section class="content">

        <h2>Реєстрація учасника</h2>

        <form id="registerForm">

            <label for="name">ПІБ</label>
            <input
                type="text"
                id="name"
                placeholder="Введіть ПІБ"
                required>

            <label for="email">Електронна пошта</label>
            <input
                type="email"
                id="email"
                placeholder="example@gmail.com"
                required>

            <label for="phone">Телефон</label>
            <input
                type="tel"
                id="phone"
                placeholder="+380991234567"
                required>

            <label for="course">Курс</label>
            <select id="course" required>
                <option value="">Оберіть курс</option>
                <option>1 курс</option>
                <option>2 курс</option>
                <option>3 курс</option>
                <option>4 курс</option>
            </select>

            <button type="submit">
                Зареєструватися
            </button>

        </form>

        <div id="message"></div>

    </section>

</main>

<footer>
    <p>© 2025 Конференція студентів</p>
</footer>

<script src="script.js"></script>

</body>
</html>
